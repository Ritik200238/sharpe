name: ci

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  agent:
    name: agent — typecheck + 36 tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: typecheck
        run: npm run typecheck --workspace services/agent
      - name: test (incl. bit-for-bit determinism)
        run: npm test --workspace services/agent

  web:
    name: web — typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: typecheck
        run: npm run typecheck --workspace apps/web
      - name: build
        run: npm run build --workspace apps/web
